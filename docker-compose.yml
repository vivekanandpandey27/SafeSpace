services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safespace-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safespace-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

 
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: safespace-admin
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped
